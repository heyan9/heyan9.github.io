<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCH_PROMPTER v3</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --ui-border: rgba(255,255,255,0.15);
            --panel-bg: rgba(18,18,18,0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: -apple-system, "Inter", "SF Pro Display", sans-serif;
            overflow: hidden; transition: background 0.3s, color 0.3s;
        }

        /* --- 初始输入 --- */
        #setup-screen {
            display: flex; flex-direction: column;
            padding: 40px 24px; height: 100%; max-width: 800px; margin: 0 auto;
        }
        h1 { font-size: 10px; letter-spacing: 5px; color: #666; margin-bottom: 20px; text-transform: uppercase; }
        textarea { 
            flex: 1; background: transparent; border: 1px solid var(--ui-border);
            color: var(--text); padding: 20px; font-size: 18px; line-height: 1.6; outline: none; border-radius: 4px;
        }
        .start-btn {
            background: var(--text); color: var(--bg); border: none;
            padding: 24px; margin-top: 24px; font-weight: 900; letter-spacing: 2px; cursor: pointer;
        }

        /* --- 提词器舞台 --- */
        #prompter-screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        #prompter-screen.landscape { width: 100vh; height: 100vw; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); }

        #scroll-view {
            width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
            padding-top: 45vh; /* 文字起始位置 */
            scroll-behavior: auto; -webkit-overflow-scrolling: touch;
        }
        #scroll-view::-webkit-scrollbar { display: none; }

        #text-content {
            font-weight: 800; line-height: 1.5; text-align: left; /* 左对齐 */
            white-space: pre-wrap; word-wrap: break-word; width: 100%;
            padding: 0 40px 100vh 40px; /* 底部增加100vh空白，确保能滚完 */
        }

        /* --- 抽屉面板 --- */
        #control-panel {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--ui-border);
            transform: translateY(calc(100% - 40px));
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2000; padding: 0 24px 40px;
        }
        #control-panel.expanded { transform: translateY(0); }

        .drawer-handle { height: 40px; width: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .drawer-handle::after { content: ''; width: 40px; height: 4px; background: var(--ui-border); border-radius: 2px; }

        .panel-content { display: flex; flex-direction: column; gap: 24px; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        .label-group { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 1px; opacity: 0.5; text-transform: uppercase; }
        .val-num { font-family: monospace; font-size: 14px; opacity: 1; color: var(--text); }
        
        input[type=range] { -webkit-appearance: none; height: 2px; background: var(--ui-border); outline: none; margin: 15px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--text); border-radius: 50%; border: 2px solid var(--bg); }

        /* 配色/方向选择 */
        .chip-group { display: flex; gap: 10px; }
        .chip { 
            flex: 1; padding: 12px; border: 1px solid var(--ui-border); font-size: 10px; 
            text-align: center; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* 按钮 */
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        .p-btn { 
            border: 1px solid var(--ui-border); background: transparent; color: var(--text); 
            padding: 18px; font-size: 12px; font-weight: 800; text-transform: uppercase; 
        }
        .p-btn.primary { background: var(--text); color: var(--bg); border: none; font-size: 15px; }

        .status { position: fixed; top: 20px; left: 24px; font-size: 9px; letter-spacing: 3px; z-index: 1000; pointer-events: none; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>PROMPTER_SYSTEM / V3</h1>
        <textarea id="text-input" placeholder="请在此输入台词..."></textarea>
        <button class="start-btn" onclick="initPrompter()">进入播放模式</button>
    </div>

    <div id="prompter-screen">
        <div class="status" id="status-tag">READY</div>
        
        <div id="scroll-view" onclick="onStageClick()">
            <div id="text-content"></div>
        </div>

        <div id="control-panel">
            <div class="drawer-handle" onclick="toggleDrawer()"></div>
            <div class="panel-content">
                
                <div class="row">
                    <div class="label-group"><span>滚动速度 (Speed)</span><span class="val-num" id="v-speed">10</span></div>
                    <input type="range" id="speed-range" min="0" max="100" value="10">
                </div>

                <div class="row">
                    <div class="label-group"><span>字体大小 (Size)</span><span class="val-num" id="v-size">60</span></div>
                    <input type="range" id="size-range" min="20" max="250" value="60">
                </div>

                <div class="row">
                    <div class="label-group"><span>配色 (Theme)</span></div>
                    <div class="chip-group">
                        <div class="chip active" onclick="applyTheme(0, this)">黑底白</div>
                        <div class="chip" onclick="applyTheme(1, this)">白底黑</div>
                        <div class="chip" onclick="applyTheme(2, this)">红底白</div>
                    </div>
                </div>

                <div class="btn-grid">
                    <button class="p-btn primary" onclick="toggleFS()">全屏模式 (Full Screen)</button>
                    <button class="p-btn" onclick="toggleRotate()">横屏</button>
                </div>
                
                <div class="btn-grid" style="grid-template-columns: 1fr 1fr;">
                    <button class="p-btn" onclick="toggleLoop()" id="loop-btn">循环: 关</button>
                    <button class="p-btn" onclick="exitSession()" style="color: #ff4444;">退出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            isPlaying: false,
            speed: 10,
            fontSize: 60,
            isLoop: false,
            isLandscape: false,
            lastTime: 0,
            y: 0 // 位移累加器，确保亚像素精度
        };

        const themes = [
            { bg: '#000000', text: '#ffffff', ui: 'rgba(255,255,255,0.15)', panel: 'rgba(18,18,18,0.98)' },
            { bg: '#ffffff', text: '#000000', ui: 'rgba(0,0,0,0.1)', panel: 'rgba(255,255,255,0.98)' },
            { bg: '#aa0000', text: '#ffffff', ui: 'rgba(255,255,255,0.2)', panel: 'rgba(60,0,0,0.98)' }
        ];

        const el = {
            view: document.getElementById('scroll-view'),
            txt: document.getElementById('text-content'),
            panel: document.getElementById('control-panel'),
            status: document.getElementById('status-tag'),
            speedInp: document.getElementById('speed-range'),
            sizeInp: document.getElementById('size-range')
        };

        function initPrompter() {
            const t = document.getElementById('text-input').value.trim();
            if(!t) return;
            el.txt.innerText = t;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('prompter-screen').style.display = 'block';
            
            el.txt.style.fontSize = state.fontSize + 'px';
            state.y = 0;
            el.view.scrollTop = 0;
            pause();
        }

        function applyTheme(idx, btn) {
            const t = themes[idx];
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--text', t.text);
            document.documentElement.style.setProperty('--ui-border', t.ui);
            document.documentElement.style.setProperty('--panel-bg', t.panel);
            
            document.querySelectorAll('.chip-group .chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        }

        function onStageClick() {
            // 如果面板展开，点击非控制区先收起面板
            if(el.panel.classList.contains('expanded')) {
                el.panel.classList.remove('expanded');
            } else {
                state.isPlaying ? pause() : play();
            }
        }

        function play() {
            state.isPlaying = true;
            el.panel.classList.remove('expanded');
            el.status.innerText = "RUNNING";
            state.y = el.view.scrollTop; // 从当前手动滚动的位置开始
            state.lastTime = performance.now();
            requestAnimationFrame(scrollEngine);
        }

        function pause() {
            state.isPlaying = false;
            el.status.innerText = "PAUSED";
            el.panel.classList.add('expanded');
        }

        function scrollEngine(ts) {
            if(!state.isPlaying) return;
            
            const dt = ts - state.lastTime;
            state.lastTime = ts;
            
            // 速度系数微调：即使是10也能看到明显移动
            // 每毫秒移动的像素 = 速度 * 0.005
            const pixelsPerFrame = state.speed * (dt / 10); 
            
            state.y += (state.speed * 0.08); // 基础步进
            el.view.scrollTop = state.y;

            // 检测结束 (文字高度 + 顶部留白 - 视口高度)
            if (el.view.scrollTop + el.view.clientHeight >= el.view.scrollHeight - 10) {
                if (state.isLoop) {
                    state.y = 0;
                    el.view.scrollTop = 0;
                } else {
                    pause();
                }
            }

            requestAnimationFrame(scrollEngine);
        }

        // 监听手动滚动更新累加器，防止播放跳回旧位置
        el.view.addEventListener('scroll', () => {
            if(!state.isPlaying) {
                state.y = el.view.scrollTop;
            }
        });

        function toggleDrawer() { el.panel.classList.toggle('expanded'); }

        el.speedInp.oninput = (e) => {
            state.speed = parseInt(e.target.value);
            document.getElementById('v-speed').innerText = state.speed;
        };
        el.sizeInp.oninput = (e) => {
            state.fontSize = e.target.value;
            document.getElementById('v-size').innerText = state.fontSize;
            el.txt.style.fontSize = state.fontSize + 'px';
        };

        function toggleRotate() {
            state.isLandscape = !state.isLandscape;
            document.getElementById('prompter-screen').classList.toggle('landscape', state.isLandscape);
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function toggleLoop() {
            state.isLoop = !state.isLoop;
            document.getElementById('loop-btn').innerText = `循环: ${state.isLoop ? '开' : '关'}`;
        }

        function exitSession() {
            state.isPlaying = false;
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('prompter-screen').style.display = 'none';
        }
    </script>
</body>
