<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCH-PROMPTER | 极简建筑风格提词器</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #2a2a2a;
            --font-main: -apple-system, "Inter", "Helvetica Neue", sans-serif;
            --font-mono: "SF Mono", "Roboto Mono", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
        }

        /* --- 输入界面 --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #666;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 20px;
            font-size: 18px;
            line-height: 1.6;
            border-radius: 4px;
            outline: none;
            resize: none;
            transition: border-color 0.4s;
        }

        textarea:focus {
            border-color: #666;
        }

        .setup-controls {
            display: flex;
            gap: 15px;
            margin-top: 24px;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 32px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
        }

        /* --- 提词器界面 --- */
        #prompter-screen {
            display: none;
            width: 100%;
            height: 100%;
            background: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* 横屏旋转支持 */
        #prompter-screen.landscape-mode {
            width: 100vh;
            height: 100vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        #scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            padding: 50vh 40px;
            scrollbar-width: none;
        }

        #scroll-container::-webkit-scrollbar { display: none; }

        #prompter-text {
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            white-space: pre-wrap;
        }

        /* 引导中心线 */
        .focus-line {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 1.2em;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 1;
        }

        /* 控制面板 (暂停显示) */
        #control-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 24px;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 2000;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-wrap {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .label-wrap label {
            font-size: 10px;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
        }

        .value-display {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--accent);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #333;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .mini-btn {
            background: transparent;
            border: 1px solid #333;
            color: #eee;
            padding: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .status-dot {
            position: fixed;
            top: 20px;
            left: 20px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #444;
            border-radius: 50%;
        }

        .dot.active { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }

    </style>
</head>
<body>

    <!-- 第一步：台词输入界面 -->
    <div id="setup-screen">
        <header>
            <h1>ARCH_PROMPTER v1.0</h1>
        </header>
        <textarea id="input-text" placeholder="输入你的台词...&#10;建议每句话之间换行以获得更好的阅读体验。"></textarea>
        <div class="setup-controls">
            <button class="btn" onclick="startPrompter()">进入播放</button>
        </div>
    </div>

    <!-- 第二步：提词器界面 -->
    <div id="prompter-screen">
        <div class="status-dot">
            <div id="dot-light" class="dot"></div>
            <span id="status-label">READY</span>
        </div>

        <div class="focus-line"></div>
        
        <div id="scroll-container" onclick="togglePlay()">
            <div id="prompter-text"></div>
        </div>

        <!-- 悬浮控制面板 -->
        <div id="control-panel" onclick="event.stopPropagation()">
            <div class="control-row">
                <div class="label-wrap">
                    <label>Scroll Speed</label>
                    <span class="value-display" id="speed-val">30</span>
                </div>
                <input type="range" id="speed-range" min="1" max="100" value="30">
            </div>

            <div class="control-row">
                <div class="label-wrap">
                    <label>Font Size</label>
                    <span class="value-display" id="size-val">60</span>
                </div>
                <input type="range" id="size-range" min="20" max="200" value="60">
            </div>

            <div class="action-bar">
                <button class="mini-btn" onclick="toggleOrientation()">横竖屏</button>
                <button class="mini-btn" onclick="toggleFullScreen()">全屏</button>
                <button class="mini-btn" onclick="stopPrompter()" style="color: #ff3b30;">退出</button>
            </div>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const prompterScreen = document.getElementById('prompter-screen');
        const scrollContainer = document.getElementById('scroll-container');
        const prompterText = document.getElementById('prompter-text');
        const controlPanel = document.getElementById('control-panel');
        const speedRange = document.getElementById('speed-range');
        const sizeRange = document.getElementById('size-range');
        const speedVal = document.getElementById('speed-val');
        const sizeVal = document.getElementById('size-val');
        const dotLight = document.getElementById('dot-light');
        const statusLabel = document.getElementById('status-label');

        let isPlaying = false;
        let scrollPos = 0;
        let lastTime = 0;
        let isLandscape = false;

        // 更新数值显示
        speedRange.oninput = () => speedVal.innerText = speedRange.value;
        sizeRange.oninput = () => {
            sizeVal.innerText = sizeRange.value;
            prompterText.style.fontSize = sizeRange.value + 'px';
        };

        function startPrompter() {
            const text = document.getElementById('input-text').value.trim();
            if (!text) return alert("请输入台词");
            
            prompterText.innerText = text;
            prompterText.style.fontSize = sizeRange.value + 'px';
            setupScreen.style.display = 'none';
            prompterScreen.style.display = 'block';
            
            pause();
            scrollPos = 0;
            scrollContainer.scrollTop = 0;
        }

        function stopPrompter() {
            isPlaying = false;
            setupScreen.style.display = 'flex';
            prompterScreen.style.display = 'none';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function togglePlay() {
            isPlaying ? pause() : play();
        }

        function play() {
            isPlaying = true;
            controlPanel.style.display = 'none';
            dotLight.classList.add('active');
            statusLabel.innerText = "RUNNING";
            lastTime = performance.now();
            requestAnimationFrame(scrollLoop);
        }

        function pause() {
            isPlaying = false;
            controlPanel.style.display = 'flex';
            dotLight.classList.remove('active');
            statusLabel.innerText = "PAUSED";
        }

        function scrollLoop(timestamp) {
            if (!isPlaying) return;

            const delta = timestamp - lastTime;
            lastTime = timestamp;

            const speed = speedRange.value / 15; 
            scrollPos += speed;
            scrollContainer.scrollTop = scrollPos;

            // 循环或结束判定
            if (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight + 500) {
                pause();
            } else {
                requestAnimationFrame(scrollLoop);
            }
        }

        // 切换横竖屏 (强制CSS旋转)
        function toggleOrientation() {
            isLandscape = !isLandscape;
            if (isLandscape) {
                prompterScreen.classList.add('landscape-mode');
            } else {
                prompterScreen.classList.remove('landscape-mode');
            }
        }

        // 全屏模式
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`无法进入全屏: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 监听视口变化
        window.addEventListener('resize', () => {
            if (isPlaying) pause();
        });
    </script>
</body>
</html>
