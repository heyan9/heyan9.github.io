<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROMPTER ARCH | 极简提词器</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --text: #ffffff;
            --accent: #ffffff;
            --border: #333333;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden; /* 防止body滚动，由内部容器滚动 */
        }

        /* --- 输入界面 --- */
        #setup-screen {
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 20px;
            font-weight: 400;
        }

        textarea {
            flex: 1;
            background: #050505;
            border: 1px solid var(--border);
            color: #fff;
            padding: 24px;
            font-size: 18px;
            line-height: 1.6;
            border-radius: 2px;
            outline: none;
            resize: none;
        }

        .start-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
        }

        /* --- 提词器界面 --- */
        #prompter-screen {
            display: none;
            width: 100%;
            height: 100%;
            background: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            touch-action: pan-y; /* 允许在暂停时手势滚动 */
        }

        /* 横屏旋转 */
        #prompter-screen.landscape-mode {
            width: 100vh;
            height: 100vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        #scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto; /* 允许手动滚动 */
            padding: 45vh 30px; /* 顶部留白，让起始文字位于中间 */
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
        }

        #scroll-container::-webkit-scrollbar { display: none; }

        #prompter-text {
            font-weight: 800;
            line-height: 1.4;
            text-align: left; /* 文字左对齐 */
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 控制面板 */
        #control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 20px 24px 40px 24px;
            display: none;
            flex-direction: column;
            gap: 25px;
            z-index: 2000;
        }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-wrap {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .val-num { color: #fff; font-family: monospace; font-size: 14px; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: #333;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        /* 按钮组 */
        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr; /* 横屏按钮更大 */
            gap: 12px;
        }

        .main-action-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .secondary-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #444;
            padding: 18px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* 状态灯 */
        .status-bar {
            position: fixed;
            top: 20px;
            left: 25px;
            z-index: 1500;
            pointer-events: none;
            font-size: 10px;
            letter-spacing: 3px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot { width: 6px; height: 6px; background: #444; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }

    </style>
</head>
<body>

    <!-- 输入界面 -->
    <div id="setup-screen">
        <h1>PROMPTER / SYSTEM</h1>
        <textarea id="input-text" placeholder="在此处键入或粘贴台词..."></textarea>
        <button class="start-btn" onclick="startPrompter()">Start Session</button>
    </div>

    <!-- 提词器界面 -->
    <div id="prompter-screen">
        <div class="status-bar">
            <div id="dot" class="dot"></div>
            <span id="status-text">IDLE</span>
        </div>

        <!-- 容器：点击触发播放/暂停 -->
        <div id="scroll-container">
            <div id="prompter-text"></div>
        </div>

        <!-- 底部调节面板 -->
        <div id="control-panel">
            <div class="control-row">
                <div class="label-wrap">
                    <span>Scroll Speed</span>
                    <span class="val-num" id="speed-display">10</span>
                </div>
                <input type="range" id="speed-range" min="1" max="100" value="10">
            </div>

            <div class="control-row">
                <div class="label-wrap">
                    <span>Font Size</span>
                    <span class="val-num" id="size-display">60</span>
                </div>
                <input type="range" id="size-range" min="20" max="200" value="60">
            </div>

            <div class="btn-group">
                <!-- 横屏按钮做大 -->
                <button class="main-action-btn" onclick="toggleOrientation()">Switch Orientation / 切换横屏</button>
                <button class="secondary-btn" onclick="toggleFullScreen()">Full Screen</button>
            </div>
            <button class="secondary-btn" style="border-color: #ff000066; color: #ff4444;" onclick="stopPrompter()">Exit Session</button>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const prompterScreen = document.getElementById('prompter-screen');
        const scrollContainer = document.getElementById('scroll-container');
        const prompterText = document.getElementById('prompter-text');
        const controlPanel = document.getElementById('control-panel');
        
        const speedRange = document.getElementById('speed-range');
        const sizeRange = document.getElementById('size-range');
        const speedDisplay = document.getElementById('speed-display');
        const sizeDisplay = document.getElementById('size-display');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');

        let isPlaying = false;
        let scrollPos = 0;
        let lastTime = 0;
        let isLandscape = false;

        // 初始化/进入提词
        function startPrompter() {
            const content = document.getElementById('input-text').value.trim();
            if(!content) return;

            prompterText.innerText = content;
            setupScreen.style.display = 'none';
            prompterScreen.style.display = 'block';
            
            // 初始样式同步
            updateTextStyle();
            pause();
            
            // 滚动回顶
            scrollPos = 0;
            scrollContainer.scrollTop = 0;
        }

        function stopPrompter() {
            isPlaying = false;
            setupScreen.style.display = 'flex';
            prompterScreen.style.display = 'none';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        // 核心滚动逻辑
        function scrollLoop(timestamp) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;

            // 增加滚动位置 (默认速度 10)
            const step = speedRange.value / 20; 
            scrollPos += step;
            
            scrollContainer.scrollTop = scrollPos;

            // 检查是否滚动到底部
            if (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight + 500) {
                pause();
            } else {
                requestAnimationFrame(scrollLoop);
            }
        }

        // 播放与暂停切换
        function togglePlay() {
            if (isPlaying) pause();
            else play();
        }

        function play() {
            isPlaying = true;
            controlPanel.style.display = 'none';
            dot.classList.add('active');
            statusText.innerText = "RUNNING";
            lastTime = performance.now();
            requestAnimationFrame(scrollLoop);
        }

        function pause() {
            isPlaying = false;
            controlPanel.style.display = 'flex';
            dot.classList.remove('active');
            statusText.innerText = "PAUSED";
            
            // 重要：暂停时同步当前的滚动位置，以便手动滚动后能从新位置继续
            scrollPos = scrollContainer.scrollTop;
        }

        // 监听手动滚动：当用户在暂停状态手动滑动屏幕时，更新内部变量
        scrollContainer.addEventListener('scroll', () => {
            if (!isPlaying) {
                scrollPos = scrollContainer.scrollTop;
            }
        });

        // 容器点击事件 (避开控制面板)
        scrollContainer.addEventListener('click', togglePlay);

        // UI 更新
        speedRange.oninput = () => speedDisplay.innerText = speedRange.value;
        sizeRange.oninput = () => {
            sizeDisplay.innerText = sizeRange.value;
            updateTextStyle();
        };

        function updateTextStyle() {
            prompterText.style.fontSize = sizeRange.value + 'px';
        }

        // 横屏切换
        function toggleOrientation() {
            isLandscape = !isLandscape;
            prompterScreen.classList.toggle('landscape-mode', isLandscape);
            // 旋转后可能需要校准滚动位置
            setTimeout(() => {
                scrollPos = scrollContainer.scrollTop;
            }, 300);
        }

        // 全屏切换
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
