<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCH_PROMPTER v4</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --ui-border: rgba(255,255,255,0.2);
            --panel-bg: rgba(10,10,10,0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--text);
            font-family: -apple-system, "Inter", sans-serif;
            overflow: hidden; transition: background 0.3s;
        }

        /* --- 输入界面 --- */
        #setup-screen {
            display: flex; flex-direction: column;
            padding: 20px; height: 100%; max-width: 600px; margin: 0 auto; justify-content: center;
        }
        textarea { 
            flex: 0.7; background: transparent; border: 1px solid var(--ui-border);
            color: var(--text); padding: 15px; font-size: 16px; outline: none; border-radius: 8px;
        }
        .start-btn {
            background: var(--text); color: var(--bg); border: none;
            padding: 20px; margin-top: 15px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }

        /* --- 提词器舞台 --- */
        #prompter-screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        #prompter-screen.landscape { width: 100vh; height: 100vw; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(90deg); }

        #scroll-view {
            width: 100%; height: 100%; overflow-y: auto; 
            padding: 48vh 25px 100vh 25px; /* 确保底部有足够空间滚完 */
            scroll-behavior: auto; -webkit-overflow-scrolling: touch;
        }
        #scroll-view::-webkit-scrollbar { display: none; }

        #text-content {
            font-weight: 800; line-height: 1.5; text-align: left;
            white-space: pre-wrap; word-wrap: break-word; width: 100%;
        }

        /* --- 极简微控面板 --- */
        #mini-panel {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--ui-border);
            display: none; flex-direction: column; z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 第一层：极窄工具栏 */
        .toolbar-main {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px;
        }
        .tool-item { flex: 1; display: flex; align-items: center; gap: 8px; }
        .tool-item label { font-size: 9px; opacity: 0.6; text-transform: uppercase; white-space: nowrap; }
        .tool-item span { font-size: 12px; font-family: monospace; width: 20px; }
        
        input[type=range] { -webkit-appearance: none; flex: 1; height: 2px; background: var(--ui-border); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--text); border-radius: 50%; }

        .btn-adv { background: var(--ui-border); color: var(--text); border: none; padding: 6px 12px; font-size: 10px; border-radius: 4px; font-weight: bold; }

        /* 第二层：二次展开面板 */
        #advanced-menu {
            display: none; padding: 15px; border-top: 1px solid var(--ui-border);
            grid-template-columns: repeat(2, 1fr); gap: 10px;
        }

        .menu-btn {
            background: transparent; border: 1px solid var(--ui-border); color: var(--text);
            padding: 10px; font-size: 11px; text-transform: uppercase; border-radius: 4px;
        }
        .menu-btn.active { background: var(--text); color: var(--bg); }
        .full-btn { grid-column: span 2; background: var(--text); color: var(--bg); border: none; font-weight: bold; }

        .status-dot { position: fixed; top: 15px; left: 15px; font-size: 10px; letter-spacing: 2px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <textarea id="text-input" placeholder="在此输入台词..."></textarea>
        <button class="start-btn" onclick="initPrompter()">开始录制</button>
    </div>

    <div id="prompter-screen">
        <div class="status-dot" id="status-tag">READY</div>
        
        <div id="scroll-view" onclick="handleStageClick()">
            <div id="text-content"></div>
        </div>

        <!-- 微型控制面板 -->
        <div id="mini-panel">
            <!-- 第一层：仅一行 -->
            <div class="toolbar-main">
                <div class="tool-item">
                    <label>SPD</label>
                    <input type="range" id="speed-range" min="0" max="100" value="10">
                    <span id="v-speed">10</span>
                </div>
                <div class="tool-item">
                    <label>SIZE</label>
                    <input type="range" id="size-range" min="20" max="250" value="60">
                    <span id="v-size">60</span>
                </div>
                <button class="btn-adv" onclick="toggleAdvanced()">ADV</button>
            </div>

            <!-- 第二层：展开项 -->
            <div id="advanced-menu">
                <button class="menu-btn active" onclick="setTheme(0, this)">黑底白</button>
                <button class="menu-btn" onclick="setTheme(1, this)">白底黑</button>
                <button class="menu-btn" onclick="setTheme(2, this)">红底白</button>
                <button class="menu-btn" onclick="toggleLoop()" id="loop-btn">循环: 关</button>
                <button class="menu-btn" onclick="toggleRotate()">旋转横屏</button>
                <button class="menu-btn" onclick="exitSession()" style="color:red">退出</button>
                <button class="menu-btn full-btn" onclick="toggleFS()">进入全屏模式 (FULLSCREEN)</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            isPlaying: false,
            speed: 10,
            fontSize: 60,
            isLoop: false,
            isLandscape: false,
            lastTime: 0,
            y: 0
        };

        const themes = [
            { bg: '#000000', text: '#ffffff', ui: 'rgba(255,255,255,0.2)', panel: 'rgba(10,10,10,0.9)' },
            { bg: '#ffffff', text: '#000000', ui: 'rgba(0,0,0,0.1)', panel: 'rgba(240,240,240,0.9)' },
            { bg: '#900', text: '#ffffff', ui: 'rgba(255,255,255,0.3)', panel: 'rgba(60,0,0,0.9)' }
        ];

        const el = {
            view: document.getElementById('scroll-view'),
            txt: document.getElementById('text-content'),
            panel: document.getElementById('mini-panel'),
            adv: document.getElementById('advanced-menu'),
            status: document.getElementById('status-tag')
        };

        function initPrompter() {
            const t = document.getElementById('text-input').value.trim();
            if(!t) return;
            el.txt.innerText = t;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('prompter-screen').style.display = 'block';
            state.y = 0;
            el.view.scrollTop = 0;
            updateStyle();
            pause();
        }

        function updateStyle() {
            el.txt.style.fontSize = state.fontSize + 'px';
        }

        function handleStageClick() {
            // 如果高级菜单开着，先关掉
            if(el.adv.style.display === 'grid') {
                el.adv.style.display = 'none';
            } else {
                state.isPlaying ? pause() : play();
            }
        }

        function play() {
            state.isPlaying = true;
            el.panel.style.display = 'none';
            el.status.innerText = "RUNNING";
            state.y = el.view.scrollTop;
            state.lastTime = performance.now();
            requestAnimationFrame(engine);
        }

        function pause() {
            state.isPlaying = false;
            el.panel.style.display = 'flex';
            el.status.innerText = "PAUSED";
        }

        function engine(ts) {
            if(!state.isPlaying) return;
            const dt = ts - state.lastTime;
            state.lastTime = ts;

            // 速度公式
            state.y += (state.speed * 0.08);
            el.view.scrollTop = state.y;

            if (el.view.scrollTop + el.view.clientHeight >= el.view.scrollHeight - 5) {
                if (state.isLoop) {
                    state.y = 0; el.view.scrollTop = 0;
                } else {
                    pause();
                }
            }
            requestAnimationFrame(engine);
        }

        // 同步手动滚动位置
        el.view.addEventListener('scroll', () => {
            if(!state.isPlaying) state.y = el.view.scrollTop;
        });

        // 按钮功能
        function toggleAdvanced() {
            el.adv.style.display = el.adv.style.display === 'grid' ? 'none' : 'grid';
        }

        function setTheme(idx, btn) {
            const t = themes[idx];
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--text', t.text);
            document.documentElement.style.setProperty('--ui-border', t.ui);
            document.documentElement.style.setProperty('--panel-bg', t.panel);
            document.querySelectorAll('#advanced-menu .menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.getElementById('speed-range').oninput = (e) => {
            state.speed = e.target.value;
            document.getElementById('v-speed').innerText = state.speed;
        };
        document.getElementById('size-range').oninput = (e) => {
            state.fontSize = e.target.value;
            document.getElementById('v-size').innerText = state.fontSize;
            updateStyle();
        };

        function toggleRotate() {
            state.isLandscape = !state.isLandscape;
            document.getElementById('prompter-screen').classList.toggle('landscape', state.isLandscape);
            el.adv.style.display = 'none';
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
            el.adv.style.display = 'none';
        }

        function toggleLoop() {
            state.isLoop = !state.isLoop;
            document.getElementById('loop-btn').innerText = `循环: ${state.isLoop ? '开' : '关'}`;
        }

        function exitSession() {
            location.reload();
        }
    </script>
</body>
</html>
