<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机排名系统 - 小米风格</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mi-orange: #ff6700; --mi-gold: #ffb400; }
        body {
            background-color: #f8f9fa;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 32px 32px;
            min-height: 100vh;
        }
        /* 毛玻璃白底风格 */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
        }
        .mi-btn {
            background-color: var(--mi-orange);
            transition: all 0.3s ease;
        }
        .mi-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(255, 103, 0, 0.2); }
        .star-active { color: var(--mi-gold); fill: var(--mi-gold); }
        .star-inactive { color: #e5e7eb; fill: #e5e7eb; }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" v-cloak class="max-w-6xl mx-auto">
        
        <!-- 头部 -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-800 tracking-tight">手机好用程度排行</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="px-2 py-0.5 bg-[#ff6700] text-white text-[10px] font-bold rounded">MI STYLE</span>
                    <p class="text-gray-400 text-xs uppercase tracking-widest">Real-time Ranking System</p>
                </div>
            </div>

            <!-- 数据备份/还原码 -->
            <div class="flex gap-2 w-full md:w-auto">
                <input v-model="shareCode" type="text" placeholder="粘贴备份码..." 
                       class="glass-card flex-grow px-4 py-2 rounded-xl text-sm outline-none border-none focus:ring-1 focus:ring-[#ff6700]">
                <button @click="importData" class="bg-gray-800 text-white px-4 py-2 rounded-xl text-sm font-bold">还原</button>
                <button @click="exportData" class="mi-btn text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-orange-100">备份</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 左侧：添加面板 -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-[2rem]">
                    <h2 class="text-lg font-bold mb-6 flex items-center">
                        <span class="w-1.5 h-5 bg-[#ff6700] rounded-full mr-2"></span>
                        录入手机
                    </h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block ml-1">手机型号</label>
                            <input v-model="newPhone.name" type="text" placeholder="如: 小米 14 Ultra" 
                                   class="w-full bg-white border border-gray-100 px-5 py-4 rounded-2xl outline-none focus:border-[#ff6700] transition-all font-bold">
                        </div>

                        <!-- 10星评分交互 -->
                        <div v-for="(val, key) in dimensionConfig" :key="key">
                            <div class="flex justify-between mb-2 px-1">
                                <label class="text-[10px] font-bold text-gray-500 uppercase">{{ val.label }}</label>
                                <span class="text-xs font-black text-[#ff6700]">{{ newPhone[key] }}星</span>
                            </div>
                            <div class="flex justify-between bg-white/50 p-3 rounded-2xl border border-gray-50">
                                <svg v-for="i in 10" :key="i" @click="newPhone[key] = i"
                                     :class="i <= newPhone[key] ? 'star-active' : 'star-inactive'"
                                     class="w-5 h-5 cursor-pointer hover:scale-125 transition-transform"
                                     xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" />
                                </svg>
                            </div>
                        </div>

                        <button @click="addPhone" class="mi-btn w-full text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest">
                            加入排行榜
                        </button>
                    </div>
                </div>

                <!-- 维度选择 -->
                <div class="glass-card p-6 rounded-[2rem]">
                    <h2 class="text-xs font-bold mb-4 text-gray-400 uppercase tracking-widest">当前排序基准</h2>
                    <div class="flex flex-col gap-2">
                        <button v-for="(val, key) in dimensionConfig" :key="key"
                                @click="toggleWeight(key)"
                                :class="activeWeights.includes(key) ? 'bg-gray-800 text-white' : 'bg-white text-gray-500'"
                                class="flex justify-between items-center px-5 py-3 rounded-xl text-xs font-bold transition-all shadow-sm">
                            {{ val.label }}
                            <span v-if="activeWeights.includes(key)">ACTIVE</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 右侧：排名列表 -->
            <div class="lg:col-span-8">
                <transition-group name="list" tag="div" class="space-y-4">
                    <div v-for="(phone, index) in sortedPhones" :key="phone.id" 
                         class="glass-card p-4 rounded-[2.5rem] flex flex-col md:flex-row items-center gap-6 group hover:bg-white transition-all">
                        
                        <!-- 排名号 -->
                        <div class="hidden md:block w-10 text-center">
                            <span class="text-3xl font-black italic text-gray-200 group-hover:text-[#ff6700] transition-colors">
                                {{ index + 1 }}
                            </span>
                        </div>

                        <!-- 必应图片自适应逻辑 -->
                        <div class="w-full md:w-24 h-24 rounded-3xl overflow-hidden bg-gray-100 flex-shrink-0 relative shadow-inner">
                            <img :src="getBingImage(phone.name)" 
                                 class="w-full h-full object-cover z-10 relative">
                            <!-- 底层文字占位 -->
                            <div class="absolute inset-0 flex items-center justify-center text-[10px] text-gray-300 font-bold p-2 text-center">
                                {{ phone.name }}
                            </div>
                        </div>

                        <!-- 手机信息 -->
                        <div class="flex-grow w-full">
                            <h3 class="text-xl font-black text-gray-800 mb-4">{{ phone.name }}</h3>
                            <div class="grid grid-cols-3 gap-4">
                                <div v-for="(val, key) in dimensionConfig" :key="key" 
                                     :class="activeWeights.includes(key) ? 'opacity-100' : 'opacity-30'">
                                    <div class="text-[9px] font-bold text-gray-400 uppercase mb-1">{{ val.label }}</div>
                                    <div class="flex gap-0.5">
                                        <svg v-for="s in 5" :key="s" class="w-3 h-3" 
                                             :class="s <= (phone[key]/2) ? 'star-active' : 'star-inactive'"
                                             viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 最终得分 -->
                        <div class="flex md:flex-col items-center justify-between w-full md:w-28 bg-gray-50 p-4 rounded-3xl border border-white">
                            <span class="text-[9px] font-bold text-gray-400 uppercase">SCORE</span>
                            <span class="text-3xl font-black text-gray-800">{{ calculateScore(phone) }}</span>
                            <button @click="removePhone(phone.id)" class="md:mt-2 text-gray-300 hover:text-red-500">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                            </button>
                        </div>
                    </div>
                </transition-group>
            </div>
        </div>

        <!-- 署名 -->
        <footer class="mt-20 py-10 flex flex-col items-center border-t border-gray-100">
            <div class="bg-gray-100 text-gray-400 px-6 py-2 rounded-full text-[10px] font-black tracking-[0.3em] uppercase">
                Created by HeYan
            </div>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, reactive, onMounted } = Vue;

        createApp({
            setup() {
                const phones = ref([
                    { id: 1, name: '小米 14 Ultra', usability: 10, price: 8, camera: 10 },
                    { id: 2, name: 'iPhone 15 Pro Max', usability: 9, price: 6, camera: 9 },
                    { id: 3, name: 'Redmi K70 Pro', usability: 8, price: 10, camera: 7 }
                ]);

                const dimensionConfig = {
                    usability: { label: '好用程度' },
                    price: { label: '价格优势' },
                    camera: { label: '拍照水平' }
                };

                const activeWeights = ref(['usability', 'price', 'camera']);
                const newPhone = reactive({ name: '', usability: 5, price: 5, camera: 5 });
                const shareCode = ref('');

                // 核心：借鉴必应图片匹配逻辑
                const getBingImage = (name) => {
                    const query = encodeURIComponent(name + " 手机");
                    // 必应国内CDN + Weserv中转加速
                    return `https://images.weserv.nl/?url=https://tse1-mm.cn.bing.net/th?q=${query}&w=200&h=200&c=7&rs=1&p=0&dpr=1&pid=ImgDetNav`;
                };

                const calculateScore = (phone) => {
                    if (activeWeights.value.length === 0) return 0;
                    const sum = activeWeights.value.reduce((acc, key) => acc + phone[key], 0);
                    return (sum / activeWeights.value.length).toFixed(1);
                };

                const sortedPhones = computed(() => {
                    return [...phones.value].sort((a, b) => calculateScore(b) - calculateScore(a));
                });

                const toggleWeight = (key) => {
                    const idx = activeWeights.value.indexOf(key);
                    if (idx > -1) {
                        if (activeWeights.value.length > 1) activeWeights.value.splice(idx, 1);
                    } else {
                        activeWeights.value.push(key);
                    }
                };

                const addPhone = () => {
                    if (!newPhone.name.trim()) return alert('输入型号！');
                    phones.value.push({ id: Date.now(), ...JSON.parse(JSON.stringify(newPhone)) });
                    newPhone.name = '';
                    saveToLocal();
                };

                const removePhone = (id) => {
                    phones.value = phones.value.filter(p => p.id !== id);
                    saveToLocal();
                };

                // 备份还原逻辑
                const exportData = () => {
                    const code = btoa(encodeURIComponent(JSON.stringify(phones.value)));
                    shareCode.value = code;
                    navigator.clipboard.writeText(code);
                    alert('备份成功，代码已复制！');
                };

                const importData = () => {
                    try {
                        const data = JSON.parse(decodeURIComponent(atob(shareCode.value)));
                        if (Array.isArray(data)) {
                            phones.value = data;
                            alert('还原成功！');
                        }
                    } catch (e) { alert('代码无效！'); }
                };

                const saveToLocal = () => {
                    localStorage.setItem('heyan_phone_rank', JSON.stringify(phones.value));
                };

                onMounted(() => {
                    const local = localStorage.getItem('heyan_phone_rank');
                    if (local) phones.value = JSON.parse(local);
                });

                return {
                    phones, dimensionConfig, newPhone, activeWeights,
                    sortedPhones, calculateScore, addPhone, removePhone,
                    toggleWeight, getBingImage, exportData, importData, shareCode
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
