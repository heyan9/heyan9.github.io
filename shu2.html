<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数码评测排行榜 - 手机适配专业版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mi-orange: #ff6700; }
        body { background: #ffffff; color: #333; font-family: -apple-system, "PingFang SC", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 侧边栏在手机端变为覆盖层 */
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        @media (max-width: 768px) {
            .sidebar-fixed { position: fixed; top: 0; left: 0; z-index: 50; width: 85% !important; height: 100vh; }
            .collapsed { transform: translateX(-100%); }
            .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }
        }

        /* 列表行：手机端紧凑化 */
        .rank-row { height: 68px; border-bottom: 1px solid #f2f2f2; }
        @media (max-width: 640px) {
            .rank-row { height: 60px; padding-left: 8px; padding-right: 8px; }
        }

        .star-active { color: #ffb400; fill: #ffb400; }
        .star-inactive { color: #f0f0f0; fill: #f0f0f0; }
        
        .tag-pill { font-size: 9px; padding: 1px 5px; border-radius: 4px; background: #f5f5f5; color: #888; }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0; height: 0; }
        
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-white">
    <div id="app" v-cloak class="flex h-screen overflow-hidden relative">
        
        <!-- 背景遮罩 (仅手机端显示) -->
        <div v-if="isSidebarOpen" @click="isSidebarOpen = false" class="sidebar-overlay md:hidden"></div>

        <!-- 左侧控制台 -->
        <aside :class="['sidebar-transition sidebar-fixed w-80 h-full border-r border-gray-100 p-6 flex-shrink-0 bg-white flex flex-col', { 'collapsed': !isSidebarOpen }]">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-black flex items-center">
                    <span class="w-1.5 h-5 bg-[#ff6700] rounded-full mr-2"></span>
                    添加项目
                </h2>
                <!-- 手机端关闭按钮 -->
                <button @click="isSidebarOpen = false" class="md:hidden text-gray-400 text-2xl">×</button>
            </div>
            
            <div class="space-y-5 overflow-y-auto flex-grow pr-2">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-2 uppercase tracking-widest">产品型号</label>
                    <select v-model="selectedBrand" class="w-full text-xs p-2 bg-gray-50 mb-2 rounded-lg border border-gray-100">
                        <option value="">选择品牌</option>
                        <option v-for="b in Object.keys(modelLib)" :value="b">{{b}}</option>
                    </select>
                    <input v-model="newItem.name" list="models" placeholder="输入名称..." class="w-full text-sm p-3 rounded-xl border border-gray-200 outline-none focus:border-[#ff6700]">
                    <datalist id="models"><option v-for="m in currentBrandModels" :value="m"></option></datalist>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 block mb-2 uppercase tracking-widest">标签 (空格分隔)</label>
                    <input v-model="newItem.tagsStr" placeholder="如: 性价比高 轻薄" class="w-full text-sm p-3 rounded-xl border border-gray-200 outline-none">
                </div>

                <div class="space-y-4">
                    <div v-for="(val, key) in dimensions" :key="key">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs font-bold text-gray-600">{{val}}评分</span>
                            <span class="text-xs font-black text-[#ff6700]">{{newItem[key]}}</span>
                        </div>
                        <div class="flex justify-between">
                            <svg v-for="i in 10" :key="i" @click="newItem[key] = i"
                                 :class="i <= newItem[key] ? 'star-active' : 'star-inactive'"
                                 class="w-4 h-4 cursor-pointer" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <button @click="addItem" class="w-full bg-[#ff6700] text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-50 active:scale-95 transition-all">
                    确认加入榜单
                </button>

                <div class="grid grid-cols-2 gap-2 pt-4">
                    <button @click="exportData" class="text-[9px] text-gray-400 py-2 border rounded-lg">备份</button>
                    <button @click="importData" class="text-[9px] text-gray-400 py-2 border rounded-lg">还原</button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-grow flex flex-col h-full bg-white">
            <!-- 头部 -->
            <nav class="h-16 md:h-20 flex items-center justify-between px-4 md:px-8 border-b border-gray-50 flex-shrink-0">
                <div class="flex items-center gap-3 flex-grow">
                    <button @click="isSidebarOpen = !isSidebarOpen" class="p-2 hover:bg-gray-50 rounded-lg">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                    <input v-model="rankingTitle" class="text-base md:text-xl font-black border-none focus:ring-0 p-0 w-full bg-transparent" placeholder="榜单名称...">
                </div>

                <!-- 排序维度切换 -->
                <div class="hidden sm:flex bg-gray-50 p-1 rounded-xl gap-1">
                    <button v-for="(label, key) in sortOptions" :key="key" @click="sortBy = key"
                            :class="['px-3 py-1 text-[10px] font-bold rounded-lg transition-all', sortBy === key ? 'bg-white text-[#ff6700] shadow-sm' : 'text-gray-400']">
                        {{label}}
                    </button>
                </div>
                <!-- 手机端简易排序按钮 -->
                <select v-model="sortBy" class="sm:hidden text-[10px] bg-gray-50 border-none rounded-lg py-1 px-2 focus:ring-0">
                    <option v-for="(label, key) in sortOptions" :value="key">{{label}}</option>
                </select>
            </nav>

            <!-- 列表主体 -->
            <div class="flex-grow overflow-y-auto">
                <!-- 手机端表头 -->
                <div class="flex items-center px-4 py-2 text-[9px] font-bold text-gray-300 uppercase tracking-widest border-b border-gray-50 sticky top-0 bg-white z-10">
                    <div class="w-8 text-center">排名</div>
                    <div class="w-10 ml-2 text-center">产品</div>
                    <div class="flex-grow ml-3">型号/评价</div>
                    <div class="w-16 text-right">分数</div>
                </div>

                <!-- 列表项 -->
                <transition-group name="list">
                    <div v-for="(item, index) in sortedItems" :key="item.id" class="rank-row flex items-center px-4">
                        <!-- 排名 -->
                        <div class="w-8 text-center font-black italic text-gray-200 text-lg leading-none">{{ index + 1 }}</div>
                        
                        <!-- 缩略图 -->
                        <div class="w-10 h-10 rounded-xl bg-gray-50 flex-shrink-0 border border-gray-50 overflow-hidden ml-2">
                            <img :src="`https://images.weserv.nl/?url=https://tse1-mm.cn.bing.net/th?q=${encodeURIComponent(item.name)}&w=100&h=100&c=7`" class="w-full h-full object-cover">
                        </div>

                        <!-- 型号标签 -->
                        <div class="flex-grow ml-3 overflow-hidden">
                            <div class="font-bold text-xs md:text-sm text-gray-800 truncate leading-tight">{{ item.name }}</div>
                            <div class="flex gap-1 mt-1 overflow-x-hidden">
                                <span v-for="tag in item.tags.slice(0,2)" class="tag-pill">{{ tag }}</span>
                            </div>
                        </div>

                        <!-- 电脑端明细分 -->
                        <div class="hidden lg:flex w-48 justify-around text-xs font-bold text-gray-300">
                            <span v-for="(v, k) in dimensions" :class="{'text-[#ff6700]': sortBy === k}">{{ item[k] }}</span>
                        </div>

                        <!-- 关键得分 (手机端也显示) -->
                        <div class="w-16 text-right pr-2">
                            <span class="text-xl font-black text-[#ff6700] italic leading-none">
                                {{ sortBy === 'average' ? item.average : item[sortBy] }}
                            </span>
                        </div>

                        <!-- 删除 -->
                        <button @click="removeItem(item.id)" class="text-gray-200 hover:text-red-400 text-xl font-light ml-1 pr-1">×</button>
                    </div>
                </transition-group>
                
                <div v-if="items.length === 0" class="py-20 text-center text-gray-300 italic text-xs">
                    点击左上角按钮添加第一条数据
                </div>
            </div>

            <!-- 署名 -->
            <footer class="h-10 flex items-center justify-center border-t border-gray-50 text-[9px] text-gray-200 font-bold tracking-[0.3em] flex-shrink-0">
                何岩制作 HEYAN PRODUCE
            </footer>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, reactive, watch } = Vue;

        createApp({
            setup() {
                const isSidebarOpen = ref(window.innerWidth > 768);
                const rankingTitle = ref(localStorage.getItem('rank_title_v5') || '数码产品红黑榜');
                const sortBy = ref('average'); 
                const dimensions = { usability: '体验', price: '性价比', performance: '性能' };
                const sortOptions = { average: '综合', usability: '体验', price: '低价', performance: '性能' };

                const modelLib = {
                    '苹果': ['iPhone 15 Pro', 'iPad Pro M4', 'AirPods Pro 2'],
                    '小米': ['小米 14 Ultra', '小米平板 6S Pro', 'Redmi K70'],
                    '华为': ['Pura 70 Ultra', 'Mate 60 Pro', 'FreeBuds Pro 3'],
                    '其他': ['PS5 Slim', 'Switch OLED', 'DJI Pocket 3']
                };

                const selectedBrand = ref('');
                const currentBrandModels = computed(() => modelLib[selectedBrand.value] || []);
                const items = ref(JSON.parse(localStorage.getItem('rank_items_v5') || '[{"id":1,"name":"小米 14 Ultra","usability":10,"price":8,"performance":10,"tags":["影像之王"]},{"id":2,"name":"iPhone 15 Pro","usability":9,"price":6,"performance":9,"tags":["顶级手感"]}]'));
                const newItem = reactive({ name: '', usability: 5, price: 5, performance: 5, tagsStr: '' });

                const sortedItems = computed(() => {
                    const list = items.value.map(p => ({
                        ...p,
                        average: ((p.usability + p.price + p.performance) / 3).toFixed(1)
                    }));
                    return list.sort((a, b) => {
                        const valA = sortBy.value === 'average' ? parseFloat(a.average) : a[sortBy.value];
                        const valB = sortBy.value === 'average' ? parseFloat(b.average) : b[sortBy.value];
                        return valB - valA;
                    });
                });

                const addItem = () => {
                    if (!newItem.name) return alert('请输入名称');
                    items.value.push({
                        id: Date.now(),
                        name: newItem.name,
                        usability: newItem.usability,
                        price: newItem.price,
                        performance: newItem.performance,
                        tags: newItem.tagsStr.split(/\s+/).filter(t => t)
                    });
                    newItem.name = ''; newItem.tagsStr = '';
                    if(window.innerWidth <= 768) isSidebarOpen.value = false;
                };

                const removeItem = (id) => {
                    if(confirm('确定删除吗？')) items.value = items.value.filter(p => p.id !== id);
                };

                const exportData = () => {
                    const code = btoa(encodeURIComponent(JSON.stringify(items.value)));
                    navigator.clipboard.writeText(code).then(() => alert('备份代码已复制'));
                };

                const importData = () => {
                    const code = prompt('粘贴备份码:');
                    if(code) {
                        try {
                            items.value = JSON.parse(decodeURIComponent(atob(code)));
                            alert('还原成功');
                        } catch(e) { alert('错误'); }
                    }
                };

                watch(items, (val) => localStorage.setItem('rank_items_v5', JSON.stringify(val)), { deep: true });
                watch(rankingTitle, (val) => localStorage.setItem('rank_title_v5', val));

                return {
                    items, newItem, dimensions, sortedItems, addItem, removeItem, 
                    modelLib, selectedBrand, currentBrandModels, exportData, importData,
                    isSidebarOpen, rankingTitle, sortBy, sortOptions
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
