<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数码产品综合评分排行榜</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mi-orange: #ff6700; }
        body { background: #ffffff; color: #333; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; overflow-x: hidden; }
        
        /* 侧边栏平滑折叠 */
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .collapsed { transform: translateX(-100%); width: 0 !important; margin-right: 0 !important; opacity: 0; }
        
        /* 极致紧凑列表 */
        .rank-row { height: 60px; border-bottom: 1px solid #f8f8f8; }
        .rank-row:hover { background: #fafafa; }
        
        /* 毛玻璃白底 */
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid #f0f0f0; }
        
        .star-active { color: #ffb400; fill: #ffb400; }
        .star-inactive { color: #f0f0f0; fill: #f0f0f0; }
        
        .tag-pill { font-size: 10px; padding: 1px 8px; border-radius: 6px; background: #f5f5f5; color: #777; }
        
        input, select { border: 1px solid #e5e7eb; border-radius: 10px; outline: none; transition: all 0.2s; }
        input:focus { border-color: var(--mi-orange); box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.1); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-white">
    <div id="app" v-cloak class="flex h-screen overflow-hidden">
        
        <!-- 左侧录入控制台 -->
        <aside :class="['sidebar-transition w-80 h-full border-r border-gray-100 p-6 flex-shrink-0 bg-white z-20 shadow-sm', { 'collapsed': !isSidebarOpen }]">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-lg font-bold flex items-center">
                    <span class="w-1.5 h-5 bg-[#ff6700] rounded-full mr-2"></span>
                    添加评测项目
                </h2>
            </div>
            
            <div class="space-y-6">
                <!-- 型号输入 -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400">产品型号/名称</label>
                    <div class="flex gap-1 mb-2">
                        <select v-model="selectedBrand" class="text-xs p-2 bg-gray-50 flex-shrink-0 w-24">
                            <option value="">品牌选择</option>
                            <option v-for="b in Object.keys(modelLib)" :value="b">{{b}}</option>
                        </select>
                        <input v-model="newItem.name" list="models" placeholder="输入名称..." class="w-full text-xs p-3">
                    </div>
                    <datalist id="models">
                        <option v-for="m in currentBrandModels" :value="m"></option>
                    </datalist>
                </div>

                <!-- 标签 -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400">评价标签 (空格分隔)</label>
                    <input v-model="newItem.tagsStr" placeholder="如: 屏幕极佳 续航崩了" class="w-full text-xs p-3">
                </div>

                <!-- 打分 -->
                <div class="space-y-4 pt-2">
                    <div v-for="(val, key) in dimensions" :key="key">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs font-bold text-gray-600">{{val}}评分</span>
                            <span class="text-xs font-black text-[#ff6700]">{{newItem[key]}}</span>
                        </div>
                        <div class="flex justify-between">
                            <svg v-for="i in 10" :key="i" @click="newItem[key] = i"
                                 :class="i <= newItem[key] ? 'star-active' : 'star-inactive'"
                                 class="w-4 h-4 cursor-pointer hover:scale-125 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <button @click="addItem" class="w-full bg-[#ff6700] text-white py-4 rounded-xl font-bold shadow-lg shadow-orange-50 hover:bg-[#e65d00] transition-all">
                    确定加入列表
                </button>

                <!-- 数据管理 -->
                <div class="pt-8 border-t border-gray-50 space-y-2">
                    <button @click="exportData" class="w-full text-[10px] text-gray-400 py-2 border border-dashed rounded-lg">备份数据</button>
                    <button @click="importData" class="w-full text-[10px] text-gray-400 py-2 border border-dashed rounded-lg">导入还原</button>
                </div>
            </div>
        </aside>

        <!-- 右侧主展示区 -->
        <main class="flex-grow flex flex-col h-full bg-white">
            <!-- 顶部工具栏 -->
            <nav class="h-20 flex items-center justify-between px-6 border-b border-gray-50">
                <div class="flex items-center gap-4 flex-grow">
                    <!-- 折叠开关 -->
                    <button @click="isSidebarOpen = !isSidebarOpen" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                    <!-- 编辑标题 -->
                    <input v-model="rankingTitle" class="text-xl font-black border-none focus:ring-0 p-0 w-auto bg-transparent" placeholder="输入排行榜名称...">
                </div>

                <!-- 排序筛选器 -->
                <div class="flex items-center bg-gray-50 p-1 rounded-xl gap-1">
                    <button v-for="(label, key) in sortOptions" :key="key"
                            @click="sortBy = key"
                            :class="['px-4 py-1.5 text-xs font-bold rounded-lg transition-all', sortBy === key ? 'bg-white text-[#ff6700] shadow-sm' : 'text-gray-400 hover:text-gray-600']">
                        {{label}}
                    </button>
                </div>
            </nav>

            <!-- 列表内容 -->
            <div class="flex-grow overflow-y-auto px-4 md:px-8 py-4">
                <div class="min-w-[700px]">
                    <!-- 列表头 -->
                    <div class="flex items-center px-4 py-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-50">
                        <div class="w-10 text-center">排名</div>
                        <div class="w-12 ml-2">图片</div>
                        <div class="flex-grow ml-4">型号与评价标签</div>
                        <div class="w-64 flex justify-around text-center">
                            <span v-for="(v, k) in dimensions" :class="{'text-[#ff6700]': sortBy === k}">{{v}}</span>
                        </div>
                        <div :class="['w-20 text-right pr-2', {'text-[#ff6700]': sortBy === 'average'}]">综合分</div>
                        <div class="w-8"></div>
                    </div>

                    <!-- 动态列表项 -->
                    <transition-group name="list">
                        <div v-for="(item, index) in sortedItems" :key="item.id" class="rank-row flex items-center px-4">
                            <!-- 排名 -->
                            <div class="w-10 text-center font-black italic text-gray-200 text-xl">{{ index + 1 }}</div>
                            
                            <!-- 缩略图 (必应国内镜像) -->
                            <div class="w-10 h-10 rounded-xl bg-gray-50 overflow-hidden flex-shrink-0 border border-gray-50">
                                <img :src="`https://images.weserv.nl/?url=https://tse1-mm.cn.bing.net/th?q=${encodeURIComponent(item.name)}&w=120&h=120&c=7`" 
                                     class="w-full h-full object-cover">
                            </div>

                            <!-- 型号/标签 -->
                            <div class="flex-grow ml-4 overflow-hidden">
                                <div class="font-bold text-sm text-gray-800">{{ item.name }}</div>
                                <div class="flex flex-wrap gap-1 mt-0.5">
                                    <span v-for="tag in item.tags" class="tag-pill">{{ tag }}</span>
                                </div>
                            </div>

                            <!-- 维度分数 -->
                            <div class="w-64 flex justify-around text-center font-bold text-xs">
                                <div v-for="(v, k) in dimensions" :key="k" class="w-20" :class="sortBy === k ? 'text-[#ff6700]' : 'text-gray-300'">
                                    {{ item[k] }}
                                </div>
                            </div>

                            <!-- 综合/当前排名的分 -->
                            <div class="w-20 text-right pr-2">
                                <div class="text-xl font-black text-[#ff6700] italic">
                                    {{ sortBy === 'average' ? item.average : item[sortBy] }}
                                </div>
                            </div>

                            <!-- 删除 -->
                            <div class="w-8 text-right">
                                <button @click="removeItem(item.id)" class="text-gray-200 hover:text-red-400 font-bold">×</button>
                            </div>
                        </div>
                    </transition-group>
                    
                    <div v-if="items.length === 0" class="py-20 text-center text-gray-300 italic text-sm">
                        还没有数据，请在左侧添加你的第一个数码评测
                    </div>
                </div>
            </div>

            <!-- 页脚 -->
            <footer class="h-12 flex flex-col items-center justify-center border-t border-gray-50">
                <div class="text-[10px] text-gray-200 font-bold tracking-[0.4em] uppercase">何岩制作 HEYAN PRODUCE</div>
            </footer>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, reactive, watch } = Vue;

        createApp({
            setup() {
                const isSidebarOpen = ref(true);
                const rankingTitle = ref(localStorage.getItem('rank_title_v4') || '我的数码产品红黑榜');
                
                // 默认维度
                const dimensions = { usability: '体验', price: '性价比', performance: '影像' };
                
                // 排序选项
                const sortBy = ref('average'); 
                const sortOptions = { average: '综合排名', usability: '体验优先', price: '性价比优先', performance: '影像优先' };

                // 内置联想库
                const modelLib = {
                    '苹果': ['iPhone 15 Pro', 'iPad Pro M4', 'Apple Watch Ultra', 'AirPods Pro', 'MacBook Pro'],
                    '小米': ['小米 14 Ultra', '小米平板 6S Pro', '小米 Mix Fold 3', 'Redmi K70', '小米电视 S Pro'],
                    '华为': ['Pura 70 Ultra', 'Mate 60 Pro', 'MatePad Pro', 'FreeBuds Pro 3', '华为 Watch GT4'],
                    '索尼': ['PS5 Slim', 'WH-1000XM5', 'A7M4 相机', '索尼 A90J 电视']
                };

                const selectedBrand = ref('');
                const currentBrandModels = computed(() => modelLib[selectedBrand.value] || []);
                
                // 数据列表
                const items = ref(JSON.parse(localStorage.getItem('rank_items_v4') || '[{"id":1,"name":"小米 14 Ultra","usability":10,"price":8,"performance":10,"tags":["影像之王"]},{"id":2,"name":"iPhone 15 Pro","usability":9,"price":6,"performance":9,"tags":["手感极佳"]}]'));
                
                const newItem = reactive({ name: '', usability: 5, price: 5, performance: 5, tagsStr: '' });

                // 核心：处理排序逻辑
                const sortedItems = computed(() => {
                    const list = items.value.map(p => ({
                        ...p,
                        average: ((p.usability + p.price + p.performance) / 3).toFixed(1)
                    }));
                    
                    return list.sort((a, b) => {
                        const valA = sortBy.value === 'average' ? parseFloat(a.average) : a[sortBy.value];
                        const valB = sortBy.value === 'average' ? parseFloat(b.average) : b[sortBy.value];
                        return valB - valA;
                    });
                });

                const addItem = () => {
                    if (!newItem.name) return alert('请输入产品名称');
                    items.value.push({
                        id: Date.now(),
                        name: newItem.name,
                        usability: newItem.usability,
                        price: newItem.price,
                        performance: newItem.performance,
                        tags: newItem.tagsStr.split(/\s+/).filter(t => t)
                    });
                    newItem.name = ''; newItem.tagsStr = '';
                };

                const removeItem = (id) => {
                    if(confirm('确定删除此项吗？')) items.value = items.value.filter(p => p.id !== id);
                };

                const exportData = () => {
                    const code = btoa(encodeURIComponent(JSON.stringify(items.value)));
                    navigator.clipboard.writeText(code).then(() => alert('数据备份码已复制，请妥善保存！'));
                };

                const importData = () => {
                    const code = prompt('请粘贴备份码:');
                    if(code) {
                        try {
                            items.value = JSON.parse(decodeURIComponent(atob(code)));
                            alert('还原成功！');
                        } catch(e) { alert('备份码无效'); }
                    }
                };

                // 持久化存储
                watch(items, (val) => localStorage.setItem('rank_items_v4', JSON.stringify(val)), { deep: true });
                watch(rankingTitle, (val) => localStorage.setItem('rank_title_v4', val));

                return {
                    items, newItem, dimensions, sortedItems, addItem, removeItem, 
                    modelLib, selectedBrand, currentBrandModels, exportData, importData,
                    isSidebarOpen, rankingTitle, sortBy, sortOptions
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
